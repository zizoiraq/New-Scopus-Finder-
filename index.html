<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار القوائم السوداء</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: auto; background: white; border-radius: 15px; padding: 20px; }
        input, button { padding: 10px; margin: 5px; }
        input { width: 60%; }
        .result { margin-top: 20px; padding: 15px; border-radius: 10px; }
        .found { background: #f8d7da; color: #721c24; border: 1px solid #dc3545; }
        .not-found { background: #d4edda; color: #155724; border: 1px solid #28a745; }
        .list-box { background: #f0f0f0; padding: 10px; border-radius: 5px; margin: 10px 0; max-height: 200px; overflow-y: auto; font-size: 12px; }
        pre { background: #2d2d2d; color: white; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔍 اختبار القائمة السوداء</h2>
    
    <div>
        <label>🔗 رابط القائمة السوداء:</label>
        <input type="text" id="listUrl" value="https://raw.githubusercontent.com/zizoiraq/New-Scopus-Finder/main/blacklist.json" style="width: 100%; direction: ltr;">
        <button onclick="loadList()">📥 تحميل القائمة</button>
    </div>
    
    <hr>
    
    <div>
        <label>📝 أدخل اسم المجلة للبحث:</label>
        <input type="text" id="journalName" placeholder="مثال: Pakistan Heart Journal" style="width: 70%;">
        <button onclick="searchInList()">🔍 بحث</button>
    </div>
    
    <div id="result"></div>
    
    <div id="listContent" class="list-box" style="display:none;"></div>
</div>

<script>
    let currentList = [];
    
    async function loadList() {
        const url = document.getElementById('listUrl').value;
        const resultDiv = document.getElementById('result');
        const listDiv = document.getElementById('listContent');
        
        resultDiv.innerHTML = '<div>⏳ جاري تحميل القائمة...</div>';
        
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json();
            currentList = data;
            
            // عرض أول 20 اسم في القائمة
            listDiv.style.display = 'block';
            listDiv.innerHTML = `<strong>✅ تم تحميل ${currentList.length} مجلة.</strong><br><br>
                                 <strong>أول 20 اسم في القائمة:</strong><br>
                                 ${currentList.slice(0, 20).map((name, i) => `${i+1}. "${name}"`).join('<br>')}`;
            
            resultDiv.innerHTML = `<div class="not-found">✅ تم تحميل ${currentList.length} مجلة بنجاح!</div>`;
            
        } catch (error) {
            resultDiv.innerHTML = `<div class="found">❌ خطأ في التحميل: ${error.message}<br>تأكد من أن الرابط صحيح والملف موجود</div>`;
            listDiv.style.display = 'none';
        }
    }
    
    function searchInList() {
        const journalName = document.getElementById('journalName').value.trim();
        const resultDiv = document.getElementById('result');
        
        if (!journalName) {
            resultDiv.innerHTML = '<div class="found">❌ الرجاء إدخال اسم المجلة</div>';
            return;
        }
        
        if (currentList.length === 0) {
            resultDiv.innerHTML = '<div class="found">❌ الرجاء تحميل القائمة أولاً</div>';
            return;
        }
        
        // بحث بالمطابقة التامة
        const found = currentList.find(item => item === journalName);
        
        // بحث مع تجاهل الحروف
        const foundCaseInsensitive = currentList.find(item => item.toLowerCase() === journalName.toLowerCase());
        
        // بحث يحتوي على
        const contains = currentList.filter(item => item.toLowerCase().includes(journalName.toLowerCase()));
        
        let html = `<div style="background: #f0f0f0; padding: 15px; border-radius: 10px;">
                    <strong>🔍 نتيجة البحث عن: "${journalName}"</strong><br><br>`;
        
        if (found) {
            html += `<div class="found" style="padding: 10px;">✅ <strong>موجودة في القائمة السوداء!</strong><br>المطابقة التامة مع: "${found}"</div>`;
        } else if (foundCaseInsensitive) {
            html += `<div class="found" style="padding: 10px;">⚠️ <strong>موجودة في القائمة السوداء (تجاهل الحروف)!</strong><br>المطابقة مع: "${foundCaseInsensitive}"</div>`;
        } else if (contains.length > 0) {
            html += `<div class="found" style="padding: 10px;">⚠️ <strong>تطابق جزئي!</strong><br>القيم المشابهة: ${contains.map(c => `"${c}"`).join(', ')}</div>`;
        } else {
            html += `<div class="not-found" style="padding: 10px;">❌ <strong>غير موجودة في القائمة السوداء</strong></div>`;
        }
        
        html += `<br><hr><strong>📋 جميع أسماء المجلات في القائمة (${currentList.length} اسم):</strong><br><div style="max-height: 300px; overflow-y: auto; font-size: 12px; margin-top: 10px;">`;
        currentList.forEach((name, i) => {
            const match = (name.toLowerCase() === journalName.toLowerCase());
            html += `<div style="${match ? 'background: #ffcccc; padding: 2px;' : 'padding: 2px;'}">${i+1}. "${name}"${match ? ' ← مطابق!' : ''}</div>`;
        });
        html += `</div></div>`;
        
        resultDiv.innerHTML = html;
    }
    
    // تحميل القائمة تلقائياً عند فتح الصفحة
    loadList();
</script>
</body>
</html>
